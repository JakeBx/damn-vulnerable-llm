# NeMo-RL v0.5.0 SFT config for DV-LLM-1B spike
# Run: uv run python examples/run_sft.py --config configs/nemo_sft_1b.yaml
# See: https://docs.nvidia.com/nemo/rl/latest/algorithms/sft.html

sft:
  max_num_epochs: 3
  max_num_steps: 10000  # large ceiling — training ends at epoch limit
  val_period: 100
  val_batches: 8
  val_global_batch_size: 8
  val_micro_batch_size: 1
  val_at_start: false
  seed: 42

checkpointing:
  enabled: true
  checkpoint_dir: "results/dv-llm-1b-sft"
  metric_name: "val:val_loss"
  higher_is_better: false
  keep_top_k: 2
  save_period: 200
  checkpoint_must_save_by: null

policy:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  tokenizer:
    name: ${policy.model_name}
    # null = use the model's built-in Llama 3 chat template
    chat_template: null
    chat_template_kwargs: null
  train_global_batch_size: 32
  train_micro_batch_size: 1
  max_total_sequence_length: 2048
  precision: "bfloat16"
  offload_optimizer_for_logprob: false
  max_grad_norm: 1.0

  dtensor_cfg:
    _v2: true
    enabled: true
    env_vars: {}
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  dynamic_batching:
    enabled: false

  sequence_packing:
    enabled: false

  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 2.0e-5
      weight_decay: 0.01
      betas: [0.9, 0.98]
      eps: 1.0e-5
      foreach: false
      fused: false

  megatron_cfg:
    enabled: false

# Dataset: openai_format expects JSONL with {"messages": [...]} records
# Set HF_REPO env var or replace the paths with local JSONL file paths.
# To use HF Hub: train_data_path: "<org>/dv-llm-sft-v1"
data:
  dataset_name: "openai_format"
  train_data_path: "data/processed/train.jsonl"
  val_data_path: "data/processed/eval.jsonl"
  max_input_seq_length: ${policy.max_total_sequence_length}
  add_bos: true
  add_eos: true
  add_generation_prompt: false
  shuffle: true
  num_workers: 2
  seed: 42

logger:
  log_dir: "logs"
  wandb_enabled: false
  tensorboard_enabled: true
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  tensorboard:
    log_dir: "logs/tb-dv-llm-1b-sft"

cluster:
  gpus_per_node: 1
  num_nodes: 1
